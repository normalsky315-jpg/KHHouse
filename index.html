<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>高雄重點行政區建案儀表板</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#16332C;          /* 深墨綠 */
  --ink2:#0F241F;
  --gold:#C19A53;
  --gold-soft:#E5D5B3;
  --bg:#F4F1E8;
  --paper:#FFFFFF;
  --paper2:#FAF8F2;
  --line:#DDD6C6;
  --text:#1E2421;
  --dim:#5C645F;
  --mute:#9AA09B;
  --red:#A93B26;   --red-bg:#FBEFEB;
  --green:#2F6B4F; --green-bg:#EEF6F1;
  --amber:#8A6A2F; --amber-bg:#FAF4E6;
  --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}

/* ───── 樓書封面式頁首 ───── */
.masthead{background:var(--ink);color:#F2EDE0;position:relative;overflow:hidden}
.masthead::after{content:'';position:absolute;inset:10px;border:1px solid rgba(193,154,83,.38);pointer-events:none}
.mast-in{max-width:1560px;margin:0 auto;padding:30px 36px 26px;display:flex;flex-wrap:wrap;gap:28px;align-items:flex-end;justify-content:space-between;position:relative}
.mast-title{display:flex;gap:18px;align-items:flex-end}
.mast-mark{width:8px;align-self:stretch;background:linear-gradient(var(--gold) 60%,transparent 60%);background-size:100% 14px}
.mast-title h1{font-family:var(--serif);font-weight:900;font-size:30px;letter-spacing:.06em;line-height:1.25}
.mast-title .sub{font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;color:var(--gold-soft);margin-top:6px}
.mast-stats{display:flex;gap:0;flex-wrap:wrap}
.mstat{padding:0 26px;border-left:1px solid rgba(229,213,179,.25)}
.mstat:first-child{border-left:none}
.mstat .l{font-size:11px;letter-spacing:.22em;color:rgba(229,213,179,.75);margin-bottom:2px}
.mstat .v{font-family:var(--serif);font-weight:700;font-size:30px;line-height:1.1;color:#F6F1E4}
.mstat .v small{font-size:13px;font-family:var(--mono);color:rgba(229,213,179,.8);font-weight:400;margin-left:2px}
.mstat .v.hi{color:#E8A18D}
.mstat .v.lo{color:#9FCDB6}
.mstat .s{font-size:11.5px;color:rgba(229,213,179,.65);font-family:var(--mono)}

/* ───── 指標列 ───── */
.kpis{background:var(--paper);border-bottom:1px solid var(--line)}
.kpis-in{max-width:1560px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr)}
.kpi{padding:15px 22px;border-right:1px solid var(--line);position:relative}
.kpi:last-child{border-right:0}
.kpi::before{content:'';position:absolute;top:0;left:22px;width:26px;height:2px;background:var(--gold)}
.kpi .l{font-size:11px;color:var(--mute);letter-spacing:.16em;margin:4px 0 2px}
.kpi .v{font-family:var(--serif);font-size:25px;font-weight:700;letter-spacing:-.01em}
.kpi .v.red{color:var(--red)} .kpi .v.green{color:var(--green)}
.kpi .s{font-size:12px;color:var(--dim)}

/* ───── 工具列 ───── */
.toolbar{max-width:1560px;margin:0 auto;padding:14px 36px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.vbtn{padding:9px 22px;font-family:var(--serif);font-size:15px;font-weight:700;letter-spacing:.18em;border:1.5px solid var(--ink);cursor:pointer;background:transparent;color:var(--ink);transition:.13s}
.vbtn.active,.vbtn:hover{background:var(--ink);color:var(--gold-soft)}
.search-inp{flex:1;min-width:220px;padding:9px 14px;border:1px solid var(--line);border-bottom:2px solid var(--ink);background:var(--paper);font:15px var(--sans);outline:none}
.search-inp:focus{border-color:var(--gold)}
select.fil{padding:9px 12px;border:1px solid var(--line);border-bottom:2px solid var(--ink);background:var(--paper);font:14.5px var(--sans);cursor:pointer;outline:none}
.tbl-ct{font-family:var(--mono);font-size:13px;color:var(--mute);letter-spacing:.08em}

.main{max-width:1560px;margin:0 auto;padding:18px 36px 70px}

/* ───── 地圖 ───── */
#mapView{display:none;margin-bottom:20px;border:1px solid var(--ink);background:var(--paper)}
.map-head{padding:10px 18px;background:var(--ink);color:var(--gold-soft);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.map-head h2{font-family:var(--serif);font-size:14px;font-weight:700;letter-spacing:.22em}
.map-head .mleg{font-size:12px;font-family:var(--mono);color:rgba(229,213,179,.85)}
#theMap{height:620px}
.leaflet-container{background:#EAE6D9!important;font-family:var(--sans)!important}
.leaflet-popup-content-wrapper{background:var(--paper);border:1.5px solid var(--ink);border-radius:0;padding:0;box-shadow:0 10px 32px rgba(15,36,31,.25)}
.leaflet-popup-content{margin:0;padding:0;width:236px!important}
.leaflet-popup-tip{background:var(--ink)}
.mpopup{padding:14px 16px}
.mpopup-tag{font-size:11px;font-family:var(--mono);letter-spacing:.1em;font-weight:600;margin-bottom:5px}
.mpopup h3{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:4px}
.mpopup .mprice{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:2px}
.mpopup .mdelta{font-family:var(--mono);font-size:12px;margin-bottom:8px}
.mpopup .mrow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--dim);padding:3px 0;border-bottom:1px solid var(--line)}
.mpopup .mrow span:last-child{color:var(--text);font-weight:500}
.mpopup .dbtn{display:block;width:100%;text-align:center;background:var(--ink);color:var(--gold-soft);border:none;padding:9px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;font-family:var(--serif);letter-spacing:.12em}
.mpopup .dbtn:hover{background:var(--gold);color:var(--ink2)}
.mpill{display:inline-flex;flex-direction:column;align-items:center;padding:4px 10px;font-family:var(--mono);cursor:pointer;white-space:nowrap;box-shadow:0 2px 10px rgba(15,36,31,.3);transition:transform .12s;border-radius:2px;min-width:74px}
.mpill:hover{transform:scale(1.08);z-index:9999}
.mpill .pn{font-size:12px;font-weight:700;line-height:1.3;font-family:var(--sans)}
.mpill .pp{font-size:11px;opacity:.9;line-height:1.3}
.mpill.premium{background:var(--red);color:#fff}
.mpill.normal{background:var(--ink);color:#F2EDE0}
.mpill.discount{background:var(--green);color:#fff}
.mpill.presale{background:#FFFDF7;color:var(--ink);border:1.5px dashed var(--ink)}
.mpill.warn{background:var(--amber);color:#fff}

/* ───── 卡片 ───── */
#listView{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.case-card{background:var(--paper);border:1px solid var(--line);cursor:pointer;display:flex;flex-direction:column;transition:box-shadow .16s,transform .16s;position:relative}
.case-card:hover{box-shadow:0 10px 28px rgba(15,36,31,.14);transform:translateY(-2px)}
.case-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.case-card.premium::before{background:var(--red)}
.case-card.normal::before{background:var(--ink)}
.case-card.discount::before{background:var(--green)}
.case-card.warn::before{background:repeating-linear-gradient(90deg,var(--amber) 0 14px,transparent 14px 22px)}
.cc-head{padding:16px 18px 11px;border-bottom:1px solid var(--line)}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cc-name{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:.02em;line-height:1.25}
.cc-price{font-family:var(--serif);font-size:25px;font-weight:700;white-space:nowrap;line-height:1.1}
.cc-price small{font-size:12px;color:var(--dim);font-weight:400;font-family:var(--sans)}
.cc-price.red{color:var(--red)} .cc-price.green{color:var(--green)} .cc-price.amber{color:var(--amber)}
.cc-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:5px}
.cc-dev{font-size:13px;color:var(--dim)}
.status-pill{font-size:11px;font-family:var(--mono);font-weight:600;padding:2px 8px;letter-spacing:.05em}
.sp-pre{background:var(--amber-bg);color:var(--amber);border:1px solid #E4D3A6}
.sp-new{background:var(--green-bg);color:var(--green);border:1px solid #BFDCC9}
.sp-done{background:#EEF1F6;color:#33415C;border:1px solid #C6CFDD}
.cc-vs{margin:0 18px;padding:8px 0 2px;font-size:13px;color:var(--ink);line-height:1.55}
.cc-vs::before{content:'對戰觀點';font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--gold);display:block;margin-bottom:1px}
.cc-sold{padding:11px 18px;border-bottom:1px solid var(--line)}
.sold-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.sold-l{font-size:12px;color:var(--dim)}
.sold-pct{font-family:var(--serif);font-size:16px;font-weight:700}
.sold-bar{height:5px;background:#ECE7DA;overflow:hidden}
.sold-fill{height:100%}
.sold-fill.red{background:var(--red)} .sold-fill.green{background:var(--green)} .sold-fill.amber{background:var(--gold)}
.sold-sub{font-size:11px;color:var(--mute);margin-top:3px;font-family:var(--mono)}
.cc-chips{padding:10px 18px;display:flex;flex-wrap:wrap;gap:5px;flex:1}
.chip{display:inline-block;font-size:12px;padding:3px 9px;border:1px solid var(--line);color:var(--dim);background:var(--paper2)}
.chip.k{color:var(--amber);border-color:#E4D3A6;background:var(--amber-bg)}
.chip.b{color:#33415C;border-color:#C6CFDD;background:#EEF1F6}
.chip.am{color:var(--ink);border-color:#CBD8CF;background:#F0F5F0}
.chip.am-more{color:var(--mute)}
.cc-amenities{padding:6px 18px 11px;display:flex;flex-wrap:wrap;gap:5px;border-top:1px dashed var(--line)}
.cc-foot{padding:11px 18px;background:var(--paper2);border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.vs-track{flex:1;height:4px;background:#E5DFCF;position:relative}
.vs-center{position:absolute;left:50%;top:-4px;width:1.5px;height:12px;background:var(--mute)}
.vs-fill{height:100%}
.vs-pos{background:var(--red);margin-left:50%}
.vs-neg{background:var(--green);float:right;margin-right:50%}
.vs-pct{font-family:var(--mono);font-size:13.5px;font-weight:600;min-width:60px;text-align:right}
.vs-pct.up{color:var(--red)} .vs-pct.dn{color:var(--green)}
.tag-badge{font-family:var(--serif);font-size:13px;font-weight:700;padding:4px 11px;border:1px solid currentColor;letter-spacing:.14em}
.tb-red{color:var(--red);background:var(--red-bg)}
.tb-green{color:var(--green);background:var(--green-bg)}
.tb-amber{color:var(--amber);background:var(--amber-bg)}

/* ───── 平面圖/燈箱 ───── */
.fp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:8px}
.fp-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;cursor:pointer;border:1px solid var(--line);transition:opacity .12s}
.fp-thumb:hover{opacity:.85}
.fp-count{font-size:12px;color:var(--dim);font-family:var(--mono)}
.lb-overlay{display:none;position:fixed;inset:0;background:rgba(8,16,13,.94);z-index:99999;align-items:center;justify-content:center;flex-direction:column}
.lb-overlay.on{display:flex}
.lb-img{max-width:90vw;max-height:85vh;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lb-close{position:fixed;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none;line-height:1;opacity:.8}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:36px;cursor:pointer;background:rgba(0,0,0,.3);border:none;padding:12px 16px;opacity:.7}
.lb-nav:hover,.lb-close:hover{opacity:1}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-counter{position:fixed;bottom:16px;color:rgba(255,255,255,.7);font-family:var(--mono);font-size:13px}

/* ───── 詳情視窗 ───── */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,36,31,.6);backdrop-filter:blur(3px);z-index:9000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--paper);border:2px solid var(--ink);width:100%;max-width:880px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal-hd{position:sticky;top:0;background:var(--ink);color:#F2EDE0;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;z-index:2}
.modal-hd h2{font-family:var(--serif);font-size:24px;font-weight:900;margin-top:5px;letter-spacing:.04em}
.modal-hd .mdev{font-size:13px;color:var(--gold-soft);font-family:var(--mono);margin-top:3px}
.modal-hd button{background:none;border:1px solid rgba(229,213,179,.5);color:var(--gold-soft);width:34px;height:34px;font-size:20px;cursor:pointer;flex-shrink:0}
.modal-hd button:hover{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.modal-bd{padding:22px 26px}
.modal-sold{padding:14px 26px;background:var(--paper2);border-bottom:1px solid var(--line)}
.ms-row{display:flex;align-items:center;gap:14px}
.ms-bar{flex:1;height:8px;background:#ECE7DA;overflow:hidden}
.ms-fill{height:100%}
.ms-pct{font-family:var(--serif);font-size:17px;font-weight:700;min-width:52px;text-align:right}
.ms-detail{font-size:13px;color:var(--dim);margin-top:4px;font-family:var(--mono)}
.price-hero{display:flex;align-items:baseline;gap:16px;padding-bottom:18px;border-bottom:2px solid var(--ink);margin-bottom:4px;flex-wrap:wrap}
.ph-num{font-family:var(--serif);font-size:50px;font-weight:900;line-height:1}
.ph-unit{font-size:14px;color:var(--dim);font-family:var(--mono)}
.msec-title{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ink);letter-spacing:.26em;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.msec-title::before{content:'';width:18px;height:2px;background:var(--gold)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.info-cell{background:var(--paper);padding:12px 16px}
.info-cell.full{grid-column:1/-1}
.ic-label{font-size:11px;color:var(--mute);letter-spacing:.14em;margin-bottom:3px;font-family:var(--mono)}
.ic-val{font-size:15px;font-weight:500}
.mat-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.notes-box{background:var(--amber-bg);border-left:3px solid var(--gold);padding:12px 16px;font-size:14px;color:var(--dim);line-height:1.7;margin-top:14px}
.analysis-box{background:#F0F4F1;border-left:3px solid var(--ink);padding:12px 16px;font-size:15px;line-height:1.7;margin-top:12px}
.analysis-box .al{font-family:var(--serif);font-size:12px;color:var(--ink);letter-spacing:.22em;font-weight:700;margin-bottom:5px;display:block}
.vs-box{background:var(--ink);color:#F2EDE0;padding:13px 16px;font-size:15px;line-height:1.7;margin-top:12px}
.vs-box .al{font-family:var(--serif);font-size:12px;color:var(--gold);letter-spacing:.22em;font-weight:700;margin-bottom:5px;display:block}
.am-group{margin-bottom:10px}
.am-group-label{font-size:11px;color:var(--ink);letter-spacing:.14em;font-family:var(--mono);font-weight:600;margin-bottom:5px}
.am-chips{display:flex;flex-wrap:wrap;gap:5px}
.link-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.link-btn{font-family:var(--serif);font-size:13.5px;font-weight:700;letter-spacing:.1em;padding:9px 18px;text-decoration:none;border:1.5px solid var(--ink);color:var(--ink);transition:.12s}
.link-btn:hover{background:var(--ink);color:var(--gold-soft)}
#loadErr{max-width:700px;margin:60px auto;background:var(--paper);border:1.5px solid var(--red);padding:24px;display:none;font-size:15px;line-height:1.8}
.footer{max-width:1560px;margin:0 auto;padding:0 36px 40px;font-family:var(--mono);font-size:11.5px;color:var(--mute);letter-spacing:.08em}

@media(max-width:980px){
  .kpis-in{grid-template-columns:repeat(3,1fr)}
  .kpi:nth-child(3){border-right:0}
  #listView{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .mast-in{padding:22px 18px}
  .mast-title h1{font-size:23px}
  .mstat{padding:0 16px}
  .mstat .v{font-size:23px}
  .toolbar,.main,.footer{padding-left:18px;padding-right:18px}
}
</style>
</head>
<body>

<div class="masthead">
  <div class="mast-in">
    <div class="mast-title">
      <div class="mast-mark"></div>
      <div>
        <h1 id="hTitle">高雄重點行政區建案儀表板</h1>
        <div class="sub" id="hSub">—</div>
      </div>
    </div>
    <div class="mast-stats" id="mastStats"></div>
  </div>
</div>

<div class="kpis"><div class="kpis-in" id="kpiRow"></div></div>

<div style="max-width:1560px;margin:0 auto">
  <div class="toolbar">
    <button class="vbtn active" id="btnList" onclick="setView('list')">卡 片</button>
    <button class="vbtn" id="btnMap" onclick="setView('map')">地 圖</button>
    <input class="search-inp" id="searchInput" placeholder="搜尋案名、建商、建材…">
    <select class="fil" id="districtFilter">
      <option value="all">全部行政區</option>
    </select>
    <select class="fil" id="tagFilter">
      <option value="all">全部定位</option><option value="premium">溢價</option>
      <option value="normal">均值</option><option value="discount">折價</option>
    </select>
    <select class="fil" id="statusFilter">
      <option value="all">全部狀態</option><option value="預售">預售屋</option>
      <option value="新成屋">新成屋</option><option value="成屋">成屋</option>
    </select>
    <select class="fil" id="sortSelect">
      <option value="price_desc">單價 ↓</option><option value="price_asc">單價 ↑</option>
      <option value="sold_desc">售出率 ↓</option><option value="count_desc">成交量 ↓</option>
    </select>
    <span class="tbl-ct" id="tblCt"></span>
  </div>
</div>

<div class="main">
  <div id="mapView">
    <div class="map-head">
      <h2>地圖分布 · 案名＋均價</h2>
      <span class="mleg">■ 紅＝溢價　■ 墨綠＝均值　■ 綠＝折價　⬚ 虛框＝預售　■ 土金＝警示</span>
    </div>
    <div id="theMap"></div>
  </div>
  <div id="listView"></div>
  <div id="loadErr"></div>
</div>

<div class="footer" id="footer"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div id="modalTag"></div>
        <h2 id="modalTitle"></h2>
        <div class="mdev" id="modalDev"></div>
      </div>
      <button onclick="closeModal()">×</button>
    </div>
    <div id="modalSold" class="modal-sold"></div>
    <div class="modal-bd" id="modalBody"></div>
  </div>
</div>

<div class="lb-overlay" id="lbOverlay">
  <button class="lb-close" onclick="closeLB()">×</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
  <img class="lb-img" id="lbImg" alt="平面圖">
  <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script>
let DB=null, projects=[], S=null;

const baseOf=p=>(S.districtBase&&S.districtBase[p.district])||S.base;
const hasPrice=p=>typeof p.avgPrice==='number'&&p.avgPrice>0;
function tagOf(p){
  if(p.tagMode==='manual') return p.tagManual||'normal';
  if(!hasPrice(p)) return 'normal';
  const pct=(p.avgPrice-baseOf(p))/baseOf(p)*100;
  return pct>=S.premiumPct?'premium':pct<=S.discountPct?'discount':'normal';
}
const pctOf=p=>hasPrice(p)?(p.avgPrice-baseOf(p))/baseOf(p)*100:null;
function getSold(p){
  if(!p.units||p.count==null) return null;
  return {pct:Math.min(Math.round(p.count/p.units*100),100), text:`實登 ${p.count} / ${p.units} 戶`};
}
const soldColor=t=>t==='premium'?'red':t==='discount'?'green':'amber';
const tagLabel=t=>t==='premium'?'溢價':t==='discount'?'折價':'均值';
const tagCls=t=>t==='premium'?'tb-red':t==='discount'?'tb-green':'tb-amber';
const statusCls=s=>s.includes('預售')?'sp-pre':s.includes('新成')?'sp-new':'sp-done';
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── 頁首與 KPI：全部由資料即時計算 ── */
function renderHeader(){
  document.getElementById('hTitle').textContent=S.title;
  document.getElementById('hSub').textContent=`${S.subtitle} · ${S.version} · 資料 ${S.dataDate}`;
  document.title=S.title;
  const nDist=new Set(projects.map(p=>p.district).filter(Boolean)).size;
  document.getElementById('mastStats').innerHTML=`
    <div class="mstat"><div class="l">案數</div><div class="v">${projects.length}</div><div class="s">CASES</div></div>
    <div class="mstat"><div class="l">行政區</div><div class="v">${nDist}</div><div class="s">DISTRICTS</div></div>
    <div class="mstat"><div class="l">區域基準</div><div class="v">${S.base.toFixed(2)}<small>萬/坪</small></div><div class="s">BASELINE</div></div>`;

  const withSold=projects.map(p=>({p,s:getSold(p)})).filter(x=>x.s);
  const hiS=withSold.length?withSold.reduce((a,b)=>a.s.pct>=b.s.pct?a:b):null;
  const loS=withSold.length?withSold.reduce((a,b)=>a.s.pct<=b.s.pct?a:b):null;
  const totCount=projects.reduce((a,p)=>a+(p.count||0),0);
  const thHi=S.base*(1+S.premiumPct/100), thLo=S.base*(1+S.discountPct/100);
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi"><div class="l">溢價門檻 +${S.premiumPct}%</div><div class="v red">${thHi.toFixed(2)}</div><div class="s">≥ 此為紅標</div></div>
    <div class="kpi"><div class="l">折價門檻 ${S.discountPct}%</div><div class="v green">${thLo.toFixed(2)}</div><div class="s">≤ 此為綠標</div></div>
    <div class="kpi"><div class="l">累計成交筆數</div><div class="v">${totCount.toLocaleString()}</div><div class="s">${projects.length} 案合計</div></div>
    <div class="kpi"><div class="l">最高售出率</div><div class="v green">${hiS?hiS.s.pct+'%':'—'}</div><div class="s">${hiS?esc(hiS.p.name)+' '+hiS.p.count+'/'+hiS.p.units:''}</div></div>
    <div class="kpi"><div class="l">最低售出率</div><div class="v red">${loS?loS.s.pct+'%':'—'}</div><div class="s">${loS?esc(loS.p.name)+' '+loS.p.count+'/'+loS.p.units:''}</div></div>
    <div class="kpi"><div class="l">資料更新</div><div class="v" style="font-size:19px">${esc(S.dataDate)}</div><div class="s">民國年月</div></div>`;
  document.getElementById('footer').textContent=`${S.title} · ${S.subtitle} · ${S.version}`;
}

/* ── 卡片 ── */
function renderCards(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const dist=document.getElementById('districtFilter').value;
  const tag=document.getElementById('tagFilter').value;
  const stat=document.getElementById('statusFilter').value;
  const sort=document.getElementById('sortSelect').value;
  let data=projects.map((p,i)=>({...p,idx:i,tag:tagOf(p),pct:pctOf(p),sold:getSold(p)}));
  if(search) data=data.filter(p=>[p.name,p.dev,p.addr,p.district,p.zone,...(p.kit||[]),...(p.bath||[]),...(p.other||[])].join(' ').toLowerCase().includes(search));
  if(dist!=='all') data=data.filter(p=>p.district===dist);
  if(tag!=='all') data=data.filter(p=>p.tag===tag);
  if(stat!=='all') data=data.filter(p=>p.status.includes(stat));
  if(sort==='price_desc') data.sort((a,b)=>(b.avgPrice??-1)-(a.avgPrice??-1));
  else if(sort==='price_asc') data.sort((a,b)=>(a.avgPrice??1e9)-(b.avgPrice??1e9));
  else if(sort==='sold_desc') data.sort((a,b)=>(b.sold?.pct||0)-(a.sold?.pct||0));
  else data.sort((a,b)=>(b.count||0)-(a.count||0));
  document.getElementById('tblCt').textContent=`${data.length} / ${projects.length} 案`;

  document.getElementById('listView').innerHTML=data.map(p=>{
    const hasP=p.pct!=null;
    const barW=hasP?Math.min(Math.abs(p.pct)/25*100,100):0;
    const prCls=hasP?(p.pct>=S.premiumPct?'red':p.pct<=S.discountPct?'green':'amber'):'amber';
    const kits=(p.kit||[]).slice(0,2).map(k=>`<span class="chip k">${esc(k.substring(0,20))}</span>`).join('');
    const baths=(p.bath||[]).slice(0,1).map(b=>`<span class="chip b">${esc(b.substring(0,18))}</span>`).join('');
    const allAm=p.amenities?Object.values(p.amenities).flat():[];
    const amRow=allAm.length?`<div class="cc-amenities">${allAm.slice(0,4).map(a=>`<span class="chip am">${esc(a)}</span>`).join('')}${allAm.length>4?`<span class="chip am-more">+${allAm.length-4}</span>`:''}</div>`:'';
    const vsRow=(p.vs&&p.vsPublic)?`<div class="cc-vs">${esc(p.vs)}</div>`:'';
    const soldBar=p.sold?`<div class="cc-sold">
      <div class="sold-label"><span class="sold-l">售出率（實登/總戶）</span>
      <span class="sold-pct" style="color:var(--${soldColor(p.tag)==='amber'?'amber':soldColor(p.tag)})">${p.sold.pct}%</span></div>
      <div class="sold-bar"><div class="sold-fill ${soldColor(p.tag)}" style="width:${p.sold.pct}%"></div></div>
      <div class="sold-sub">${p.sold.text}</div></div>`:'';
    return `<div class="case-card ${p.tag}${p.warn?' warn':''}" onclick="openModal(${p.idx})">
      <div class="cc-head"><div class="cc-top">
        <div class="cc-name">${esc(p.name)}${p.warn?' ⚠':''}</div>
        <div class="cc-price ${prCls}"${hasP?'':' style="font-size:17px"'}>${hasP?p.avgPrice.toFixed(2)+'<small> 萬</small>':(p.askPrice?esc(p.askPrice)+'<small> 開價</small>':'待定')}</div></div>
        <div class="cc-meta">${p.district?`<span class="status-pill sp-done">${esc(p.district)}</span>`:''}${p.zone?`<span class="status-pill sp-pre">${esc(p.zone)}</span>`:''}<span class="cc-dev">${esc(p.dev)}</span>
        <span class="status-pill ${statusCls(p.status)}">${esc(p.status)}</span></div></div>
      ${vsRow}${soldBar}
      <div class="cc-chips">${kits}${baths}</div>${amRow}
      ${hasP?`<div class="cc-foot">
        <div class="vs-track"><div class="vs-center"></div><div class="vs-fill ${p.pct>=0?'vs-pos':'vs-neg'}" style="width:${barW/2}%"></div></div>
        <span class="vs-pct ${p.pct>=0?'up':'dn'}">${(p.pct>=0?'+':'')+p.pct.toFixed(1)}%</span>
        <span class="tag-badge ${tagCls(p.tag)}">${tagLabel(p.tag)}</span></div>`:`<div class="cc-foot">
        <span style="font-size:12.5px;color:var(--mute)">尚無實價登錄</span>
        <span class="tag-badge tb-amber" style="margin-left:auto">新 案</span></div>`}</div>`;
  }).join('');
}

/* ── 地圖 ── */
let mapObj=null,mapMarkers=[];
function initMap(){
  if(mapObj) return;
  mapObj=L.map('theMap',{zoomControl:true,scrollWheelZoom:true}).setView([22.6870,120.3010],12);
  L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
    attribution:'&copy; Google',subdomains:['0','1','2','3'],maxZoom:20
  }).addTo(mapObj);
  projects.forEach((p,i)=>{
    if(p.lat==null||p.lng==null) return;
    const t=tagOf(p), pct=pctOf(p);
    let cls=p.status.includes('預售')?'presale':(t==='premium'?'premium':t==='discount'?'discount':'normal');
    if(p.warn) cls='warn';
    const ic=L.divIcon({className:'',html:`<div class="mpill ${cls}"><span class="pn">${esc(p.name)}</span><span class="pp">${hasPrice(p)?p.avgPrice.toFixed(2)+' 萬':'待定'}</span></div>`,iconSize:[null,null],iconAnchor:[0,30]});
    const m=L.marker([p.lat,p.lng],{icon:ic}).addTo(mapObj);
    const pc=t==='premium'?'var(--red)':t==='discount'?'var(--green)':'var(--amber)';
    const sold=getSold(p);
    m.bindPopup(`<div class="mpopup">
      <div class="mpopup-tag" style="color:${pc}">${t==='premium'?'▲ 溢價':t==='discount'?'▼ 折價':'● 均值'} · ${esc(p.status)}</div>
      <h3>${esc(p.name)}</h3>
      <div class="mprice" style="color:${pc}">${hasPrice(p)?p.avgPrice.toFixed(2)+' 萬/坪':(p.askPrice?'開價 '+esc(p.askPrice):'價格待定')}</div>
      ${pct!=null?`<div class="mdelta" style="color:${pc}">${(pct>=0?'+':'')+pct.toFixed(1)}% vs 基準</div>`:''}
      <div class="mrow"><span>建商</span><span>${esc(p.dev)}</span></div>
      <div class="mrow"><span>戶數</span><span>${p.units} 戶</span></div>
      ${sold?`<div class="mrow"><span>售出率</span><span style="color:${pc}">${sold.pct}%</span></div>`:''}
      <button class="dbtn" onclick="closePopups();openModal(${i})">查看完整詳情 →</button></div>`,{maxWidth:236});
    mapMarkers.push(m);
  });
  if(mapMarkers.length) mapObj.fitBounds(L.featureGroup(mapMarkers).getBounds().pad(0.15));
}
function closePopups(){if(mapObj)mapMarkers.forEach(m=>m.closePopup())}
function setView(v){
  document.getElementById('listView').style.display=v==='list'?'':'none';
  document.getElementById('mapView').style.display=v==='map'?'block':'none';
  document.getElementById('btnList').classList.toggle('active',v==='list');
  document.getElementById('btnMap').classList.toggle('active',v==='map');
  if(v==='map'){initMap();setTimeout(()=>mapObj.invalidateSize(),80)}
}

/* ── 詳情 ── */
function openModal(i){
  const p=projects[i], t=tagOf(p), pct=pctOf(p);
  const pctStr=pct!=null?(pct>=0?'+':'')+pct.toFixed(1)+'%':'';
  const pc=t==='premium'?'var(--red)':t==='discount'?'var(--green)':'var(--gold)';
  document.getElementById('modalTag').innerHTML=pct!=null?`<span class="tag-badge ${tagCls(t)}" style="font-size:13px">${tagLabel(t)} ${pctStr}</span>`:`<span class="tag-badge tb-amber" style="font-size:13px">新案 · 尚無實登</span>`;
  document.getElementById('modalTitle').textContent=p.name+(p.warn?' ⚠':'');
  document.getElementById('modalDev').textContent=`${p.district?p.district+' · ':''}${p.dev} · ${p.status} · 交屋：${p.handover||'—'}`;
  const sold=getSold(p);
  document.getElementById('modalSold').innerHTML=sold?`<div class="ms-row">
    <span style="font-size:14px;color:var(--dim);min-width:100px">售出率（實登）</span>
    <div class="ms-bar"><div class="ms-fill" style="width:${sold.pct}%;background:${pc}"></div></div>
    <span class="ms-pct" style="color:${pc}">${sold.pct}%</span></div>
    <div class="ms-detail">${sold.text} · 貸款成數 ${esc(p.loan||'—')}</div>`:'';
  const donut=(()=>{const vals=[['2R',p.r2||0,'#33658A'],['3R',p.r3||0,'#2F6B4F'],['4R',p.r4||0,'#C19A53'],['1R',p.r1||0,'#8E7CC3']].filter(x=>x[1]>0);
    const size=52,cx=26,cy=26,R=17.7,sw=5.7,circ=2*Math.PI*R;let off=0,arcs='';
    vals.forEach(([_,v,c])=>{const dash=circ*v/100;arcs+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-circ*off/100}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=v});
    const main=(p.r3||0)>(p.r2||0)?`${p.r3}%`:`${p.r2||0}%`;
    return `<svg width="52" height="52" viewBox="0 0 52 52">${arcs}<text x="26" y="30" text-anchor="middle" style="font-family:var(--mono);font-size:11px;font-weight:600">${main}</text></svg>`})();
  const fpHtml=(p.floorPlans&&p.floorPlans.length)?`
    <div class="msec-title">平 面 圖</div>
    <div class="fp-count">共 ${p.floorPlans.length} 張 · 點擊放大</div>
    <div class="fp-grid">${p.floorPlans.map((u,fi)=>`<img class="fp-thumb" src="${esc(u)}" loading="lazy" onclick="openLB(${i},${fi})" onerror="this.style.display='none'">`).join('')}</div>`:'';
  document.getElementById('modalBody').innerHTML=`
    <div class="price-hero">
      ${hasPrice(p)?`<span class="ph-num" style="color:${pc}">${p.avgPrice.toFixed(2)}</span>
      <span class="ph-unit">萬/坪</span>
      <span style="font-size:14px;font-family:var(--mono);color:var(--dim)">${p.minPrice} ~ ${p.maxPrice} · ${p.count} 筆成交</span>`
      :`<span class="ph-num" style="color:var(--amber);font-size:34px">${p.askPrice?esc(p.askPrice):'價格待定'}</span>
      <span class="ph-unit">${p.askPrice?'開價（實價登錄待累積）':''}</span>`}</div>
    ${(p.vs&&p.vs.trim())?`<div class="vs-box"><span class="al">對戰華雄音樂匯${p.vsPublic?'':'（內部）'}</span>${esc(p.vs)}</div>`:''}
    <div class="msec-title">建 案 資 訊</div>
    <div class="info-grid">
      <div class="info-cell"><div class="ic-label">地址</div><div class="ic-val">${esc(p.addr)}</div></div>
      <div class="info-cell"><div class="ic-label">樓層 / 戶數</div><div class="ic-val">${esc(p.floor)} / ${p.units} 戶</div></div>
      <div class="info-cell"><div class="ic-label">建造執照</div><div class="ic-val" style="font-size:13px">${esc(p.permit||'—')}</div></div>
      <div class="info-cell"><div class="ic-label">貸款 / 交屋</div><div class="ic-val">${esc(p.loan||'—')} / ${esc(p.handover||'—')}</div></div>
      <div class="info-cell full"><div class="ic-label">格局規劃</div><div class="ic-val">${esc(p.layout)}</div></div>
      ${(p.r1||p.r2||p.r3||p.r4)?`<div class="info-cell full"><div class="ic-label">房型比例</div><div class="ic-val" style="display:flex;align-items:center;gap:12px">${donut}
        <div style="font-size:13px;color:var(--dim);line-height:1.8">${p.r2?`2房 ${p.r2}%　`:''}${p.r3?`3房 ${p.r3}%　`:''}${p.r4?`4房 ${p.r4}%`:''}</div></div></div>`:''}
    </div>
    <div class="msec-title">廚 衛 建 材</div>
    <div class="mat-list">
      ${(p.kit||[]).map(k=>`<span class="chip k">廚 ${esc(k)}</span>`).join('')}
      ${(p.bath||[]).map(b=>`<span class="chip b">衛 ${esc(b)}</span>`).join('')}</div>
    <div class="msec-title">特 色 配 備</div>
    <div class="mat-list">${(p.other||[]).map(o=>`<span class="chip">${esc(o)}</span>`).join('')}</div>
    ${p.amenities&&Object.keys(p.amenities).length?`<div class="msec-title">公 設 設 施</div>
      <div>${Object.entries(p.amenities).map(([cat,items])=>`<div class="am-group"><div class="am-group-label">${esc(cat)}</div>
      <div class="am-chips">${items.map(it=>`<span class="chip am">${esc(it)}</span>`).join('')}</div></div>`).join('')}</div>`:''}
    ${p.notes?`<div class="notes-box"><b style="color:var(--amber)">注意事項</b><br>${esc(p.notes)}</div>`:''}
    ${p.warnReason?`<div class="notes-box"><b style="color:var(--amber)">⚠ 警示</b><br>${esc(p.warnReason)}</div>`:''}
    <div class="analysis-box"><span class="al">分 析 觀 點</span>${esc(p.analysis)}</div>
    ${fpHtml}
    <div class="link-row">
      ${p.s591?`<a class="link-btn" href="${esc(p.s591)}" target="_blank">591 詳情 ↗</a>`:''}
      ${(p.leju||p.sleju)?`<a class="link-btn" href="${esc(p.leju||p.sleju)}" target="_blank">樂居 ↗</a>`:''}
      ${p.s958?`<a class="link-btn" href="${esc(p.s958)}" target="_blank">house958 ↗</a>`:''}
      ${p.lat!=null?`<a class="link-btn" href="https://www.google.com/maps/?q=${p.lat},${p.lng}" target="_blank">Google Map ↗</a>`:''}</div>`;
  document.getElementById('overlay').classList.add('open');
  if(mapObj&&p.lat!=null) mapObj.setView([p.lat,p.lng],17,{animate:true});
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}

/* ── 燈箱 ── */
let lbProj=null,lbIdx=0;
function openLB(pi,idx){
  lbProj=projects[pi];lbIdx=idx;
  document.getElementById('lbImg').src=lbProj.floorPlans[idx];
  document.getElementById('lbCounter').textContent=(idx+1)+' / '+lbProj.floorPlans.length;
  document.getElementById('lbOverlay').classList.add('on');
}
function closeLB(){document.getElementById('lbOverlay').classList.remove('on')}
function lbNav(d){
  const imgs=lbProj.floorPlans;
  lbIdx=(lbIdx+d+imgs.length)%imgs.length;
  document.getElementById('lbImg').src=imgs[lbIdx];
  document.getElementById('lbCounter').textContent=(lbIdx+1)+' / '+imgs.length;
}
document.addEventListener('keydown',e=>{
  const lb=document.getElementById('lbOverlay');
  if(lb.classList.contains('on')){
    if(e.key==='Escape')closeLB();
    if(e.key==='ArrowLeft')lbNav(-1);
    if(e.key==='ArrowRight')lbNav(1);
  }else if(e.key==='Escape')closeModal();
});

/* ── 啟動 ── */
async function boot(){
  try{
    if(window.__DATA__){ DB=window.__DATA__; }
    else{
      const r=await fetch('./data.json?t='+Date.now());
      if(!r.ok) throw new Error('HTTP '+r.status);
      DB=await r.json();
    }
  }catch(err){
    const el=document.getElementById('loadErr');
    el.style.display='block';
    el.innerHTML=`<b style="color:var(--red)">資料載入失敗</b><br>無法讀取 data.json（${esc(err.message)}）。<br>
    1. 確認 data.json 與 index.html 在 GitHub 同一層目錄。<br>
    2. 若是離線開啟（USB 直接點開檔案），瀏覽器會封鎖本機讀檔——請使用後台「下載離線單檔版」產出的檔案。`;
    return;
  }
  S=DB.settings; projects=DB.projects;
  const dsel=document.getElementById('districtFilter');
  [...new Set(projects.map(p=>p.district).filter(Boolean))].forEach(d=>{
    const o=document.createElement('option');o.value=d;o.textContent=d;dsel.appendChild(o);
  });
  renderHeader(); renderCards();
  ['searchInput','districtFilter','tagFilter','statusFilter','sortSelect'].forEach(id=>{
    document.getElementById(id).addEventListener(id==='searchInput'?'input':'change',renderCards);
  });
  setView('list');
}
boot();
</script>
